<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Golden Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B711F" />
      <stop offset="50%" stop-color="#F3C35B" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFF3D1" stop-opacity="1" />
      <stop offset="60%" stop-color="#F3C35B" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#9B711F" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Glowing Background -->
  <circle cx="256" cy="256" r="230" fill="url(#goldGlow)" />

  <!-- Outer Elegant Diamond Frame -->
  <rect x="116" y="116" width="280" height="280" rx="40" transform="rotate(45 256 256)" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Inner Delicate Diamond Frame -->
  <rect x="136" y="136" width="240" height="240" rx="30" transform="rotate(45 256 256)" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.6" />

  <!-- Stylized Ceiling Arch / Decor Corner Profile (Cornice representation) -->
  <path d="M 140 290 
           Q 190 290 210 240 
           T 256 160 
           T 302 240 
           Q 322 290 372 290
           L 372 320
           Q 310 320 290 350
           T 256 380
           T 222 350
           Q 202 320 140 320 Z" 
        fill="url(#goldGrad)" />

  <!-- Decorative Sparkles (Stars of excellence) -->
  <!-- Top Center Sparkle -->
  <path d="M 256 100 Q 256 130 286 130 Q 256 130 256 160 Q 256 130 226 130 Q 256 130 256 100 Z" fill="#FFFFFF" />
  <!-- Center Star -->
  <path d="M 256 236 Q 256 256 276 256 Q 256 256 256 276 Q 256 256 236 256 Q 256 256 256 236 Z" fill="#FFFFFF" />
  <!-- Left Side Small Sparkle -->
  <path d="M 170 200 Q 170 215 185 215 Q 170 215 170 230 Q 170 215 155 215 Q 170 215 170 200 Z" fill="url(#goldGrad)" />
  <!-- Right Side Small Sparkle -->
  <path d="M 342 200 Q 342 215 357 215 Q 342 215 342 230 Q 342 215 327 215 Q 342 215 342 200 Z" fill="url(#goldGrad)" />
</svg>